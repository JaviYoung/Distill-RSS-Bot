services:
  distill-bot:
    build: .
    container_name: distill-bot
    restart: unless-stopped
    environment:
      # ── Telegram ──────────────────────────────────────
      TG_TOKEN: "YOUR_BOT_TOKEN"           # @BotFather 申请
      ALLOWED_USERS: "YOUR_TELEGRAM_ID"    # @userinfobot 查询，多个用逗号分隔，留空不限制

      # ── AI 接口（三选一，取消注释对应的块）────────────

      # --- DeepSeek（默认）---
      AI_PROVIDER: "deepseek"
      AI_API_KEY:  "YOUR_API_KEY"
      AI_MODEL:    "deepseek-chat"
      AI_BASE_URL: "https://api.deepseek.com"

      # --- Claude ---
      # AI_PROVIDER: "claude"
      # AI_API_KEY:  "YOUR_API_KEY"
      # AI_MODEL:    "claude-sonnet-4-6"
      # AI_BASE_URL: "https://api.anthropic.com"

      # --- OpenAI ---
      # AI_PROVIDER: "openai"
      # AI_API_KEY:  "YOUR_API_KEY"
      # AI_MODEL:    "gpt-4o-mini"
      # AI_BASE_URL: "https://api.openai.com"

      # --- 任意 OpenAI 兼容接口（如 Ollama 本地）---
      # AI_PROVIDER: "openai"
      # AI_API_KEY:  "ollama"
      # AI_MODEL:    "qwen2.5:14b"
      # AI_BASE_URL: "http://host.docker.internal:11434"

      # ── 可选参数 ──────────────────────────────────────
      AI_MAX_TOKENS:  "1200"    # AI 回复最大 token 数
      JINA_MAX_CHARS: "8000"    # 正文截断字符数
      JINA_KEY: ""              # Jina API Key（留空用免费额度）
      ENABLE_DEBUG_COMMANDS: "false"  # 测试机设为 true，启用 /debug_cache
